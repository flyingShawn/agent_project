agents:
  - agent_type: desk-agent
    display_name: "桌面管理助手"
    enabled: true
    config_dir: desk-agent
    llm:
      chat_model: "${CHAT_MODEL}"
      vision_model: "${VISION_MODEL}"
    database:
      db_type: mysql
      db_host: "${DB_HOST}"
      db_port: "${DB_PORT}"
      db_name: "${DB_NAME}"
      db_user: "${DB_USER}"
      db_password: "${DB_PASSWORD}"
    rag:
      docs_dir: /data/desk-agent/docs
      docs_collection: desk_agent_docs
      sql_dir: /data/desk-agent/sql
      sql_collection: desk_agent_sql
    reports:
      enabled: true
    tasks:
      enabled: true
      # 备用链路：desk-agent 当前主执行入口是浏览器本机 XFAgentBridge。
      # 这里保留给服务端转发模式、兼容联调或未来统一接入使用。
      api_base_url: "${DESK_SERVICE_API_URL}"

  - agent_type: ticket-agent
    display_name: "工单系统助手"
    enabled: true
    config_dir: ticket-agent
    llm:
      chat_model: "${CHAT_MODEL}"
      vision_model: "${VISION_MODEL}"
    database:
      db_type: mysql
      db_host: "${TICKET_DB_HOST}"
      db_port: "${TICKET_DB_PORT}"
      db_name: "${TICKET_DB_NAME}"
      db_user: "${TICKET_DB_USER}"
      db_password: "${TICKET_DB_PASSWORD}"
    rag:
      docs_dir: /data/ticket-agent/docs
      docs_collection: ticket_agent_docs
      sql_dir: /data/ticket-agent/sql
      sql_collection: ticket_agent_sql
    reports:
      enabled: false
    tasks:
      enabled: true
      api_base_url: "${TICKET_SERVICE_API_URL}"
