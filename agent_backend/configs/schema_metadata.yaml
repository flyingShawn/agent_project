version: "0.1"
db_type: "mysql"

naming:
  identifier_quote: "`"
  case_insensitive_identifiers: true
  normalize_columns:
    Ip_C: ip
    IP_C: ip
    Mac_c: mac
    Mac_C: mac
    Name_C: machine_name
    Groupid: group_id
    GroupID: group_id
    ClientId: client_id
    ClientID: client_id
    MtID: mtid
    mtid: mtid

security:
  restricted_tables:
    - admininfo
    - RoleGroupMap
    - g_adminroleright
  deny_select_columns:
    - admininfo.PassWord1
    - s_user.UserPwd
    - s_user.UkeyPwd

permissions:
  - name: admin_department_scope_v1
    description: 按管理员账号（admininfo.LogNum）限制可见部门（s_group.id）与其下设备
    variables:
      - name: admin_lognum
        type: text
        example: admin
    allowed_group_ids_sql: |
      SELECT g.id
      FROM s_group g
      JOIN RoleGroupMap x ON x.GroupID = g.id AND (x.is_fake_check = 0 OR x.is_fake_check IS NULL)
      JOIN g_adminroleright y ON y.RoleID = x.RoleID
      JOIN admininfo a ON a.id = y.AdminID
      WHERE a.LogNum = :admin_lognum
    apply_rules:
      - scope_name: machine_rows
        when_tables_in_query:
          - s_machine
          - alertsystemdb
          - a_clienthardinfo2
          - a_equippolicymap
          - a_policycontent
          - a_remoteinfo
          - a_machineruntime
          - onlineinfo
        machine_anchor:
          table: s_machine
          machine_id_column: ID
          group_id_column: Groupid
          join_from_mtid_sql: "JOIN s_machine m ON {source_alias}.MtID = m.ID"
        where_append_sql: "m.Groupid IN ({allowed_group_ids_sql})"
      - scope_name: group_rows
        when_tables_in_query:
          - s_group
        where_append_sql: "s_group.id IN ({allowed_group_ids_sql})"

synonyms:
  s_machine.Ip_C:
    - IP
    - ip
    - 设备IP
    - 终端IP
  s_machine.Mac_c:
    - MAC
    - mac
    - 物理地址
  s_machine.Name_C:
    - 设备名称
    - 终端名称
    - 机器名
  s_group.GroupName:
    - 部门
    - 组织
    - 部门名称
  s_user.UserName:
    - 用户名
    - 使用人
    - 绑定用户
  alertsystemdb.AlertMsg:
    - 告警内容
    - 告警信息
  a_clienthardinfo2.NetCardList:
    - 网卡
    - 网卡列表
  a_clienthardinfo2.netcardnum:
    - 网卡数量

tables:
  - name: s_machine
    description: 设备资产主表
    primary_key: DiskNum
    join_keys:
      - ID
    columns:
      - name: ID
        type: int
        comment: 设备自增ID（多数表用 MtID/mtid 指向此字段）
        semantic_key: machine.id
      - name: Name_C
        type: varchar(100)
        comment: 设备名称
        semantic_key: machine.name
      - name: Ip_C
        type: varchar(50)
        comment: IP地址
        semantic_key: machine.ip
      - name: Mac_c
        type: varchar(50)
        comment: MAC地址
        semantic_key: machine.mac
      - name: DiskNum
        type: varchar(100)
        comment: 磁盘序列号（该表主键）
        semantic_key: machine.disk_num
      - name: Groupid
        type: int
        comment: 部门ID（关联 s_group.id）
        semantic_key: machine.group_id
      - name: ClientId
        type: int
        comment: 绑定用户ID（关联 s_user.ID）
        semantic_key: machine.client_user_id
      - name: VersionNum
        type: varchar(100)
        comment: 版本号
        semantic_key: machine.version_num
      - name: VersionTime
        type: varchar(100)
        comment: 版本时间
        semantic_key: machine.version_time
      - name: MtCmt
        type: varchar(200)
        comment: 设备备注（例如 telsafedesk 代表安卓端）
        semantic_key: machine.comment
      - name: MtPingPai
        type: varchar(100)
        comment: 设备类型/品牌（Linux/ios/mac/harmony 等）
        semantic_key: machine.platform
      - name: MtGetDate
        type: datetime
        comment: 客户端安装时间
        semantic_key: machine.install_time

  - name: s_group
    description: 部门表
    primary_key: id
    columns:
      - name: id
        type: int
        comment: 部门ID
        semantic_key: group.id
      - name: GroupName
        type: varchar(100)
        comment: 部门名称
        semantic_key: group.name
      - name: ParentID
        type: int
        comment: 上级部门ID
        semantic_key: group.parent_id
      - name: GroupType
        type: int
        comment: 部门类型
        semantic_key: group.type

  - name: s_user
    description: 用户表（可绑定到设备 s_machine.ClientId）
    primary_key: ID
    columns:
      - name: ID
        type: int
        comment: 用户ID
        semantic_key: user.id
      - name: UserName
        type: varchar(100)
        comment: 用户名
        semantic_key: user.name
      - name: UserNum
        type: varchar(50)
        comment: 用户编号
        semantic_key: user.num
      - name: UserUUID
        type: varchar(50)
        comment: 用户UUID
        semantic_key: user.uuid
      - name: GroupId
        type: int
        comment: 所属部门ID
        semantic_key: user.group_id
      - name: TelNum
        type: varchar(50)
        comment: 电话号码
        semantic_key: user.phone
      - name: WorkUnit
        type: varchar(200)
        comment: 工作单位
        semantic_key: user.work_unit
      - name: UserMail
        type: varchar(50)
        comment: 邮箱
        semantic_key: user.email
      - name: HasAudit
        type: int
        comment: 是否已审计
        semantic_key: user.has_audit
      - name: UserAuditTime
        type: datetime
        comment: 审计时间
        semantic_key: user.audit_time

  - name: alertsystemdb
    description: 告警记录表（MtID 指向 s_machine.ID）
    primary_key: ID
    columns:
      - name: ID
        type: int
        comment: 自增ID
        semantic_key: alert.id
      - name: MtID
        type: int
        comment: 设备ID（关联 s_machine.ID）
        semantic_key: alert.machine_id
      - name: AlertTime
        type: datetime
        comment: 告警时间
        semantic_key: alert.time
      - name: AlertMsg
        type: varchar(500)
        comment: 告警内容
        semantic_key: alert.message
      - name: nFlag
        type: int
        comment: 标志位
        semantic_key: alert.flag

  - name: a_clienthardinfo2
    description: 终端硬件信息表（MtID 指向 s_machine.ID）
    primary_key: ID
    columns:
      - name: ID
        type: int
        comment: 自增ID
        semantic_key: hard.id
      - name: MtID
        type: int
        comment: 设备ID（关联 s_machine.ID）
        semantic_key: hard.machine_id
      - name: CUP
        type: varchar(200)
        comment: CPU
        semantic_key: hard.cpu
      - name: Board
        type: varchar(200)
        comment: 主板
        semantic_key: hard.board
      - name: Memory
        type: varchar(200)
        comment: 内存
        semantic_key: hard.memory
      - name: DiskInfo
        type: varchar(200)
        comment: 硬盘信息
        semantic_key: hard.disk_info
      - name: DiskSize
        type: varchar(200)
        comment: 硬盘大小
        semantic_key: hard.disk_size
      - name: ViewCard
        type: varchar(200)
        comment: 显卡
        semantic_key: hard.gpu
      - name: NetCardList
        type: varchar(600)
        comment: 网卡列表
        semantic_key: hard.net_cards
      - name: netcardnum
        type: int
        comment: 网卡数量
        semantic_key: hard.net_card_count
      - name: USBList
        type: varchar(600)
        comment: USB设备列表
        semantic_key: hard.usb_list
      - name: ChangeTime
        type: timestamp
        comment: 记录时间
        semantic_key: hard.change_time
      - name: IsNew
        type: int
        comment: 是否最新记录
        semantic_key: hard.is_new
      - name: IsChange
        type: int
        comment: 是否发生改变
        semantic_key: hard.is_change
      - name: IsShouldAlert
        type: int
        comment: 是否需要告警
        semantic_key: hard.should_alert
      - name: MD5
        type: varchar(50)
        comment: 硬件信息摘要
        semantic_key: hard.md5
      - name: serialnum
        type: varchar(255)
        comment: 序列号
        semantic_key: hard.serial_num
      - name: biosinfo
        type: varchar(255)
        comment: BIOS信息
        semantic_key: hard.bios_info

  - name: a_equippolicymap
    description: 设备策略对应表（MtID 指向 s_machine.ID）
    primary_key: ID
    columns:
      - name: ID
        type: int
        comment: 自增ID
        semantic_key: equip_policy_map.id
      - name: MtID
        type: int
        comment: 设备ID（关联 s_machine.ID）
        semantic_key: equip_policy_map.machine_id
      - name: PolicyName
        type: varchar(45)
        comment: 策略名称（冗余字段）
        semantic_key: policy.name
      - name: PolicyID
        type: int
        comment: 策略ID（关联 a_policyname.ID；也用于关联 a_policycontent.PolicyID）
        semantic_key: policy.id
      - name: nFlag
        type: varchar(45)
        comment: 标志位
        semantic_key: policy.flag

  - name: a_policyname
    description: 策略名称表
    primary_key: ID
    columns:
      - name: ID
        type: int
        comment: 策略ID
        semantic_key: policy_name.id
      - name: Name
        type: varchar(100)
        comment: 策略名称
        semantic_key: policy_name.name
      - name: nType
        type: int
        comment: 策略类型
        semantic_key: policy_name.type
      - name: Comment
        type: varchar(100)
        comment: 备注/编码
        semantic_key: policy_name.comment

  - name: a_policycontent
    description: 策略内容表（不同 Code 下 Name1/Name2/Name3/nValue 的语义不同）
    primary_key: ID
    columns:
      - name: ID
        type: int
        comment: 自增ID
        semantic_key: policy_content.id
      - name: PolicyID
        type: int
        comment: 策略ID（通常与 a_equippolicymap.PolicyID 对应）
        semantic_key: policy_content.policy_id
      - name: Code
        type: varchar(50)
        comment: 策略大类编码
        semantic_key: policy_content.code
      - name: nType
        type: int
        comment: 类型
        semantic_key: policy_content.type
      - name: Name1
        type: varchar(100)
        comment: 子项键
        semantic_key: policy_content.key
      - name: Name2
        type: varchar(100)
        comment: 子项值（部分 Code 以 Name2 存 bool/int/string）
        semantic_key: policy_content.value_text
      - name: Name3
        type: varchar(8000)
        comment: 子项值（部分 Code 以 Name3 存长文本/路径/url）
        semantic_key: policy_content.value_longtext
      - name: nValue
        type: int
        comment: 子项值（部分 Code 以 nValue 存 int/bool）
        semantic_key: policy_content.value_int
      - name: comment
        type: varchar(100)
        comment: 备注
        semantic_key: policy_content.comment

  - name: a_adminpolicymap
    description: 管理员-策略映射表（仅保留结构；权限以管理员-部门为主）
    primary_key: ID
    columns:
      - name: ID
        type: int
        comment: 自增ID
        semantic_key: admin_policy_map.id
      - name: AdminID
        type: int
        comment: 管理员ID
        semantic_key: admin.id
      - name: PolicyID
        type: int
        comment: 策略ID
        semantic_key: policy.id
      - name: nFlag
        type: int
        comment: 标志位
        semantic_key: admin_policy_map.flag

  - name: a_remoteinfo
    description: 远程协助历史记录表（保留最近十条记录）
    primary_key: null
    columns:
      - name: ip
        type: varchar(50)
        comment: 远程设备IP
        semantic_key: remote.ip
      - name: machinename
        type: varchar(30)
        comment: 远程设备机器名
        semantic_key: remote.machine_name
      - name: department
        type: varchar(20)
        comment: 部门
        semantic_key: remote.department
      - name: lasttime
        type: datetime
        comment: 最近远程时间
        semantic_key: remote.last_time
      - name: mtid
        type: int
        comment: 远程设备ID（关联 s_machine.ID）
        semantic_key: remote.machine_id
      - name: managerid
        type: varchar(20)
        comment: 发起远程的管理机ID
        semantic_key: remote.manager_id

  - name: admininfo
    description: 管理员信息表
    primary_key: LogNum
    columns:
      - name: ID
        type: int
        comment: 管理员ID
        semantic_key: admin.id
      - name: LogNum
        type: varchar(50)
        comment: 管理员账号（登录名）
        semantic_key: admin.lognum
      - name: UserName
        type: varchar(50)
        comment: 管理员展示名
        semantic_key: admin.name
      - name: PassWord1
        type: varchar(50)
        comment: 密码（禁止查询返回）
        semantic_key: admin.password

  - name: RoleGroupMap
    description: 角色-部门映射表（用于权限子查询；字段结构为示例 SQL 所需最小集合）
    primary_key: null
    partial: true
    columns:
      - name: GroupID
        type: int
        comment: 部门ID（关联 s_group.id）
        semantic_key: role_group.group_id
      - name: RoleID
        type: int
        comment: 角色ID
        semantic_key: role_group.role_id
      - name: is_fake_check
        type: int
        comment: 过滤字段（0 或 NULL 代表有效）
        semantic_key: role_group.is_fake_check

  - name: g_adminroleright
    description: 管理员-角色权限表（用于权限子查询；字段结构为示例 SQL 所需最小集合）
    primary_key: null
    partial: true
    columns:
      - name: AdminID
        type: int
        comment: 管理员ID（关联 admininfo.ID）
        semantic_key: admin_role.admin_id
      - name: RoleID
        type: int
        comment: 角色ID
        semantic_key: admin_role.role_id

  - name: a_machineruntime
    description: 终端运行状态表（用于在线/关机在线等查询；字段结构为示例 SQL 所需最小集合）
    primary_key: ID
    partial: true
    columns:
      - name: ID
        type: int
        comment: 自增ID
        semantic_key: runtime.id
      - name: MtID
        type: int
        comment: 设备ID（关联 s_machine.ID）
        semantic_key: runtime.machine_id

  - name: onlineinfo
    description: 在线信息表（用于在线设备查询；字段结构为示例 SQL 所需最小集合）
    primary_key: null
    partial: true
    columns:
      - name: mtid
        type: int
        comment: 设备ID（关联 s_machine.ID）
        semantic_key: online.machine_id

relationships:
  - from: s_machine.Groupid
    to: s_group.id
    kind: many_to_one
    comment: 设备所属部门
  - from: s_machine.ClientId
    to: s_user.ID
    kind: many_to_one
    comment: 设备绑定用户
  - from: alertsystemdb.MtID
    to: s_machine.ID
    kind: many_to_one
    comment: 告警对应设备
  - from: a_clienthardinfo2.MtID
    to: s_machine.ID
    kind: many_to_one
    comment: 硬件信息对应设备
  - from: a_equippolicymap.MtID
    to: s_machine.ID
    kind: many_to_one
    comment: 策略对应设备
  - from: a_equippolicymap.PolicyID
    to: a_policyname.ID
    kind: many_to_one
    comment: 策略ID到策略名称
  - from: a_policycontent.PolicyID
    to: a_equippolicymap.PolicyID
    kind: many_to_one
    comment: 策略内容到策略ID
  - from: a_remoteinfo.mtid
    to: s_machine.ID
    kind: many_to_one
    comment: 远程协助对应设备
  - from: a_machineruntime.MtID
    to: s_machine.ID
    kind: many_to_one
    comment: 运行状态对应设备
  - from: onlineinfo.mtid
    to: s_machine.ID
    kind: many_to_one
    comment: 在线信息对应设备

policy_code_dictionary:
  - code: SystemFilterSwitch
    description: 系统设置策略（示例子项结构）
    items:
      - name1: ShowDesktop_TextColor
        value_source: Name2
        value_type: hex_color
        meaning: 桌面文字颜色
      - name1: ShowDeskTip
        value_source: nValue
        value_type: int_bool
        meaning: 是否开启提示
      - name1: ShowDesktop_CName
        value_source: nValue
        value_type: int_bool
        meaning: 水印是否显示计算机名
      - name1: LockScreenWallPaper
        enabled_source: nValue
        enabled_type: int_bool
        value_source: Name3
        value_type: path
        meaning: 锁屏壁纸路径与是否启用
      - name1: WallPaperRotate
        enabled_source: nValue
        enabled_type: int_bool
        value_source: Name1
        value_type: int_minutes
        meaning: 壁纸轮换间隔分钟与是否启用

  - code: TelDeskSettings
    description: 移动端桌面设置策略（示例子项结构）
    items:
      - name1_in:
          - showuser
          - showmac
          - showip
          - showsn
          - showflash
          - showwifiset
        value_source: Name2
        value_type: int_bool
        meaning: 是否显示开关
      - name1: customInfo
        value_source: Name3
        value_type: text
        meaning: 自定义文字内容
      - name1: customTextSize
        value_source: Name2
        value_type: int
        meaning: 自定义文字大小
      - name1: shortcut
        value_source:
          title: Name2
          url: Name3
        value_type: pair
        meaning: 网址快捷方式名称与URL

query_patterns:
  - name: machines_by_ip
    user_intent: 按IP查询设备与所属部门/绑定用户
    requires_permission: admin_department_scope_v1
    sql: |
      SELECT
        m.ID,
        u.UserName AS UserName,
        g.GroupName AS GroupName,
        m.Name_C,
        m.Ip_C,
        m.Mac_c
      FROM s_machine m
      LEFT JOIN s_user u ON m.ClientId = u.ID
      LEFT JOIN s_group g ON m.Groupid = g.id
      WHERE m.Ip_C = :ip
        AND m.Groupid IN ({allowed_group_ids_sql})

  - name: alerts_by_ip
    user_intent: 查询某IP的告警信息
    requires_permission: admin_department_scope_v1
    sql: |
      SELECT
        a.AlertTime,
        a.AlertMsg,
        a.nFlag,
        m.ID AS MachineID,
        m.Name_C,
        m.Ip_C
      FROM alertsystemdb a
      JOIN s_machine m ON a.MtID = m.ID
      WHERE m.Ip_C = :ip
        AND m.Groupid IN ({allowed_group_ids_sql})
      ORDER BY a.AlertTime DESC
      LIMIT :limit

  - name: latest_hardware_by_ip
    user_intent: 查询某IP最新硬件信息
    requires_permission: admin_department_scope_v1
    sql: |
      SELECT
        h.ChangeTime,
        h.CUP,
        h.Board,
        h.Memory,
        h.DiskInfo,
        h.DiskSize,
        h.ViewCard,
        h.NetCardList,
        h.netcardnum,
        h.IsNew,
        h.IsChange,
        h.IsShouldAlert,
        m.ID AS MachineID,
        m.Name_C,
        m.Ip_C
      FROM a_clienthardinfo2 h
      JOIN s_machine m ON h.MtID = m.ID
      WHERE m.Ip_C = :ip
        AND m.Groupid IN ({allowed_group_ids_sql})
      ORDER BY h.ChangeTime DESC
      LIMIT 1

  - name: changed_hardware_by_ip_range
    user_intent: 查询某IP指定时间范围的硬件变更记录
    requires_permission: admin_department_scope_v1
    sql: |
      SELECT
        h.ChangeTime,
        h.IsChange,
        h.IsShouldAlert,
        h.MD5,
        h.CUP,
        h.Memory,
        h.DiskInfo,
        h.NetCardList,
        m.ID AS MachineID,
        m.Name_C,
        m.Ip_C
      FROM a_clienthardinfo2 h
      JOIN s_machine m ON h.MtID = m.ID
      WHERE m.Ip_C = :ip
        AND h.ChangeTime >= :start_time
        AND h.ChangeTime < :end_time
        AND h.IsChange = 1
        AND m.Groupid IN ({allowed_group_ids_sql})
      ORDER BY h.ChangeTime DESC
      LIMIT :limit

  - name: machine_policies
    user_intent: 查询某设备的策略列表（含策略名称）
    requires_permission: admin_department_scope_v1
    sql: |
      SELECT
        p.MtID AS MachineID,
        p.PolicyID,
        pn.Name AS PolicyName,
        pn.nType AS PolicyType,
        pn.Comment AS PolicyComment
      FROM a_equippolicymap p
      LEFT JOIN a_policyname pn ON p.PolicyID = pn.ID
      JOIN s_machine m ON p.MtID = m.ID
      WHERE p.MtID = :mtid
        AND m.Groupid IN ({allowed_group_ids_sql})
      ORDER BY pn.nType ASC, pn.Name ASC
      LIMIT :limit

  - name: policy_items_by_policyid_and_code
    user_intent: 查询某策略ID下某个Code的配置项
    requires_permission: admin_department_scope_v1
    sql: |
      SELECT
        c.PolicyID,
        c.Code,
        c.Name1,
        c.Name2,
        c.Name3,
        c.nValue,
        c.comment
      FROM a_policycontent c
      WHERE c.PolicyID = :policy_id
        AND c.Code = :code
      ORDER BY c.Name1 ASC
      LIMIT :limit

  - name: shutdown_online_machines
    user_intent: 查询关机在线机器（示例 SQL 模板）
    requires_permission: admin_department_scope_v1
    sql: |
      SELECT
        r.ID,
        0 AS PicIndex,
        u.UserName AS UserName,
        g.GroupName AS GroupName,
        m.Name_C,
        m.Ip_C,
        m.Mac_c
      FROM a_machineruntime r
      INNER JOIN onlineinfo o ON r.MtID = o.mtid
      INNER JOIN s_machine m ON r.MtID = m.ID
      LEFT JOIN s_user u ON m.ClientId = u.ID
      LEFT JOIN s_group g ON m.Groupid = g.id
      WHERE m.Groupid IN ({allowed_group_ids_sql})

sql_shots:
  - user_query: 查询 192.168.1.10 的设备信息（含部门和绑定用户）
    requires_permission: admin_department_scope_v1
    sql: |
      SELECT
        m.ID,
        u.UserName AS UserName,
        g.GroupName AS GroupName,
        m.Name_C,
        m.Ip_C,
        m.Mac_c
      FROM s_machine m
      LEFT JOIN s_user u ON m.ClientId = u.ID
      LEFT JOIN s_group g ON m.Groupid = g.id
      WHERE m.Ip_C = '192.168.1.10'
        AND m.Groupid IN ({allowed_group_ids_sql})
      LIMIT 50

  - user_query: 查询某IP的最近100条告警
    requires_permission: admin_department_scope_v1
    sql: |
      SELECT
        a.AlertTime,
        a.AlertMsg,
        a.nFlag,
        m.Name_C,
        m.Ip_C
      FROM alertsystemdb a
      JOIN s_machine m ON a.MtID = m.ID
      WHERE m.Ip_C = :ip
        AND m.Groupid IN ({allowed_group_ids_sql})
      ORDER BY a.AlertTime DESC
      LIMIT 100

  - user_query: 查询某IP最新硬件信息
    requires_permission: admin_department_scope_v1
    sql: |
      SELECT
        h.ChangeTime,
        h.CUP,
        h.Board,
        h.Memory,
        h.DiskInfo,
        h.DiskSize,
        h.ViewCard,
        h.NetCardList,
        h.netcardnum
      FROM a_clienthardinfo2 h
      JOIN s_machine m ON h.MtID = m.ID
      WHERE m.Ip_C = :ip
        AND m.Groupid IN ({allowed_group_ids_sql})
      ORDER BY h.ChangeTime DESC
      LIMIT 1

  - user_query: 查询某IP最近30天硬件有变化且需要告警的记录
    requires_permission: admin_department_scope_v1
    sql: |
      SELECT
        h.ChangeTime,
        h.IsChange,
        h.IsShouldAlert,
        h.MD5,
        h.NetCardList,
        m.Name_C,
        m.Ip_C
      FROM a_clienthardinfo2 h
      JOIN s_machine m ON h.MtID = m.ID
      WHERE m.Ip_C = :ip
        AND h.ChangeTime >= :start_time
        AND h.ChangeTime < :end_time
        AND h.IsChange = 1
        AND h.IsShouldAlert = 1
        AND m.Groupid IN ({allowed_group_ids_sql})
      ORDER BY h.ChangeTime DESC
      LIMIT 200

  - user_query: 查询某设备的策略列表
    requires_permission: admin_department_scope_v1
    sql: |
      SELECT
        p.MtID AS MachineID,
        p.PolicyID,
        pn.Name AS PolicyName,
        pn.nType AS PolicyType
      FROM a_equippolicymap p
      LEFT JOIN a_policyname pn ON p.PolicyID = pn.ID
      JOIN s_machine m ON p.MtID = m.ID
      WHERE p.MtID = :mtid
        AND m.Groupid IN ({allowed_group_ids_sql})
      ORDER BY pn.nType ASC, pn.Name ASC
      LIMIT 200

  - user_query: 查询某策略ID下 SystemFilterSwitch 的所有子项
    requires_permission: admin_department_scope_v1
    sql: |
      SELECT
        c.PolicyID,
        c.Code,
        c.Name1,
        c.Name2,
        c.Name3,
        c.nValue
      FROM a_policycontent c
      WHERE c.PolicyID = :policy_id
        AND c.Code = 'SystemFilterSwitch'
      ORDER BY c.Name1 ASC
      LIMIT 500

  - user_query: 查询关机在线机器（固定模板，只传账号名即可按权限过滤）
    requires_permission: admin_department_scope_v1
    sql: |
      SELECT
        r.ID,
        0 AS PicIndex,
        u.UserName AS UserName,
        g.GroupName AS GroupName,
        m.Name_C,
        m.Ip_C,
        m.Mac_c
      FROM a_machineruntime r
      INNER JOIN onlineinfo o ON r.MtID = o.mtid
      INNER JOIN s_machine m ON r.MtID = m.ID
      LEFT JOIN s_user u ON m.ClientId = u.ID
      LEFT JOIN s_group g ON m.Groupid = g.id
      WHERE m.Groupid IN ({allowed_group_ids_sql})

