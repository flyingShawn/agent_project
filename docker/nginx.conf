# Nginx配置文件 - 用于前端静态文件服务和API反向代理

server {
    listen 80;
    server_name localhost;

    # 根目录指向Vue构建的dist目录
    root /usr/share/nginx/html;
    index index.html;

    # 开启gzip压缩，提高传输效率
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;

    # 前端路由支持（Vue Router的history模式）
    # 所有非文件请求都返回index.html，让前端路由处理
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 普通 API 反向代理
    # 普通 JSON 接口保持默认缓冲和传输语义，避免公网链路长时间 pending
    location /api/ {
        proxy_pass http://backend:8000;

        # 传递客户端真实IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE (Server-Sent Events) 专用代理
    # 只给流式聊天接口关闭缓冲，避免影响普通 JSON 接口
    location = /api/v1/chat {
        proxy_pass http://backend:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }

    # 静态资源缓存
    # 对于带hash的文件，设置长期缓存
    # config.js 是容器启动时生成的运行时配置，不能长期缓存。
    location = /config.js {
        try_files $uri =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 错误页面
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
