# Docker Compose配置文件
# 用于编排多个服务：前端、后端、Qdrant向量数据库
# Ollama大模型服务部署在Docker外部

services:
  # ==================== 后端服务 ====================
  backend:
    image: agent-backend:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: agent-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # 智能体名称
      - AGENT_NAME=${AGENT_NAME:-desk-agent}

      # 模型配置 - OLLAMA_BASE_URL指向外部Ollama服务
      # Windows/macOS使用host.docker.internal，Linux使用宿主机IP
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - CHAT_MODEL=${CHAT_MODEL:-qwen2.5:7b-instruct}
      - VISION_MODEL=${VISION_MODEL:-qwen2.5-vl:7b-instruct}

      # RAG文档知识库配置
      - RAG_DOCS_DIR=/data/docs
      - RAG_QDRANT_URL=http://qdrant:6333
      - RAG_QDRANT_PATH=/app/.qdrant_local
      - RAG_QDRANT_COLLECTION=${RAG_QDRANT_COLLECTION:-desk_agent_docs}
      - RAG_EMBEDDING_MODEL=${RAG_EMBEDDING_MODEL:-BAAI/bge-small-zh-v1.5}
      - RAG_HYBRID_ALPHA=${RAG_HYBRID_ALPHA:-0.7}
      - RAG_TOP_K=${RAG_TOP_K:-5}

      # SQL样本库配置
      - RAG_SQL_DIR=/data/sql
      - RAG_SQL_QDRANT_COLLECTION=${RAG_SQL_QDRANT_COLLECTION:-desk_agent_sql}
      - RAG_SQL_TOP_K=${RAG_SQL_TOP_K:-3}
      - RAG_SQL_CANDIDATE_K=${RAG_SQL_CANDIDATE_K:-15}
      - RAG_SQL_HYBRID_ALPHA=${RAG_SQL_HYBRID_ALPHA:-0.8}

      # 数据库配置
      - DATABASE_URL=${DATABASE_URL:-}
      - DB_TYPE=${DB_TYPE:-mysql}
      - DB_HOST=${DB_HOST:-}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-}
      - DB_USER=${DB_USER:-}
      - DB_PASSWORD=${DB_PASSWORD:-}
    volumes:
      # 挂载文档知识库目录（宿主机docs目录 → 容器/data/docs）
      # 注意：挂载源使用独立的宿主机变量，不使用容器内的RAG_DOCS_DIR
      - ${HOST_DOCS_DIR:-./data/desk-agent/docs}:/data/docs:ro
      # 挂载SQL样本库目录（宿主机sql目录 → 容器/data/sql）
      - ${HOST_SQL_DIR:-./data/desk-agent/sql}:/data/sql:ro
      # 挂载配置文件目录（schema_metadata.yaml等）
      - ${CONFIG_DIR:-./agent_backend/configs}:/app/configs:ro
      # 持久化向量数据库
      - qdrant_data:/app/.qdrant_local
    depends_on:
      - qdrant
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==================== 前端服务 ====================
  frontend:
    image: agent-frontend:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: agent-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ==================== Qdrant向量数据库 ====================
  qdrant:
    # image: hub-mirror.c.163.com/qdrant/qdrant:latest
    image: qdrant/qdrant:latest
    container_name: agent-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"  # REST API端口
      - "6334:6334"  # gRPC端口
    volumes:
      # 持久化向量数据
      - qdrant_data:/qdrant/storage
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

# ==================== 网络配置 ====================
networks:
  app-network:
    driver: bridge

# ==================== 数据卷配置 ====================
volumes:
  qdrant_data:
    driver: local