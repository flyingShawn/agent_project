# Docker Compose配置文件
# 用于编排多个服务：前端、后端、Qdrant向量数据库
# Ollama大模型服务部署在Docker外部

services:
  # ==================== 后端服务 ====================
  backend:
    image: agent-backend:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: agent-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      # 智能体名称
      - AGENT_NAME=${AGENT_NAME:-desk-agent}

      # 模型配置 - LLM_BASE_URL指向外部LLM服务（OpenAI兼容协议）
      # Windows/macOS使用host.docker.internal，Linux使用宿主机IP
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - CHAT_MODEL=${CHAT_MODEL:-qwen3.5:9b}
      - VISION_MODEL=${VISION_MODEL:-qwen3.5:9b}

      # RAG文档知识库配置
      - RAG_DOCS_DIR=/data/docs
      - RAG_QDRANT_URL=http://qdrant:6333
      - RAG_QDRANT_PATH=
      - RAG_QDRANT_API_KEY=${RAG_QDRANT_API_KEY:-}
      - RAG_QDRANT_COLLECTION=${RAG_QDRANT_COLLECTION:-desk_agent_docs}
      - RAG_EMBEDDING_MODEL=${RAG_EMBEDDING_MODEL:-BAAI/bge-small-zh-v1.5}
      # RAG_HYBRID_ALPHA 当前代码未读取，文档检索未使用混合权重
      - RAG_HYBRID_ALPHA=${RAG_HYBRID_ALPHA:-0.7}
      - RAG_TOP_K=${RAG_TOP_K:-5}
      - RAG_VECTOR_MIN_SCORE=${RAG_VECTOR_MIN_SCORE:-0.5}
      - RAG_CANDIDATE_K=${RAG_CANDIDATE_K:-30}

      # SQL样本库配置
      - RAG_SQL_DIR=/data/sql
      - RAG_SQL_QDRANT_COLLECTION=${RAG_SQL_QDRANT_COLLECTION:-desk_agent_sql}
      - RAG_SQL_TOP_K=${RAG_SQL_TOP_K:-3}
      - RAG_SQL_CANDIDATE_K=${RAG_SQL_CANDIDATE_K:-15}
      - RAG_SQL_HYBRID_ALPHA=${RAG_SQL_HYBRID_ALPHA:-0.8}

      # 数据库配置
      - DATABASE_URL=${DATABASE_URL:-}
      - DB_TYPE=${DB_TYPE:-mysql}
      - DB_HOST=${DB_HOST:-}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-}
      - DB_USER=${DB_USER:-}
      - DB_PASSWORD=${DB_PASSWORD:-}
      - SQL_MAX_ROWS=${SQL_MAX_ROWS:-500}

      # 网络搜索配置
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - WEB_SEARCH_MAX_RESULTS=${WEB_SEARCH_MAX_RESULTS:-5}
      - SQL_LOG_FULL_PROMPT=${SQL_LOG_FULL_PROMPT:-true}

      # 聊天历史数据库路径
      - CHAT_DB_PATH=${CHAT_DB_PATH:-/app/data/chat_history.db}

      # 外部入口与第三方会话上报
      - EXTERNAL_ENTRY_SECRET=${EXTERNAL_ENTRY_SECRET:-}
      - EXTERNAL_ENTRY_TTL_SECONDS=${EXTERNAL_ENTRY_TTL_SECONDS:-28800}
      - THIRD_PARTY_CHAT_HISTORY_BASE_URL=${THIRD_PARTY_CHAT_HISTORY_BASE_URL:-}
      - THIRD_PARTY_CHAT_HISTORY_TIMEOUT_SECONDS=${THIRD_PARTY_CHAT_HISTORY_TIMEOUT_SECONDS:-3}

      # CORS允许的前端来源
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost}
    volumes:
      # 挂载文档知识库目录（宿主机docs目录 -> 容器/data/docs）
      - ${HOST_DOCS_DIR:-./data/desk-agent/docs}:/data/docs:ro
      # 挂载SQL样本库目录（宿主机sql目录 -> 容器/data/sql）
      - ${HOST_SQL_DIR:-./data/desk-agent/sql}:/data/sql:ro
      # 挂载配置文件目录（schema_metadata.yaml等）
      - ${CONFIG_DIR:-./agent_backend/configs}:/app/configs:ro
      # 持久化聊天历史数据库
      - chat_data:/app/data
    depends_on:
      - qdrant
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==================== 前端服务 ====================
  frontend:
    image: agent-frontend:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: agent-frontend
    restart: unless-stopped
    ports:
      - "81:80"
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - VITE_APP_NAME=${VITE_APP_NAME:-阳途智能助手}
      - VITE_APP_SUBTITLE=${VITE_APP_SUBTITLE:-阳途智能助手为您服务}
      - VITE_APP_WELCOME_TEXT=${VITE_APP_WELCOME_TEXT:-有什么我能帮您的呢？}
      - VITE_APP_INPUT_PLACEHOLDER=${VITE_APP_INPUT_PLACEHOLDER:-给智能助手发消息}
      - VITE_QUICK_OPTIONS=${VITE_QUICK_OPTIONS:-查看客户端在线状态,今日远程操作记录,近期开关机日志,老旧资产设备查询,部门设备数量统计,USB使用记录查询}
    depends_on:
      - backend
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ==================== Qdrant向量数据库 ====================
  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: agent-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"  # REST API端口
      - "6334:6334"  # gRPC端口
    volumes:
      # 持久化向量数据
      - qdrant_data:/qdrant/storage
    networks:
      - app-network

# ==================== 网络配置 ====================
networks:
  app-network:
    driver: bridge

# ==================== 数据卷配置 ====================
volumes:
  qdrant_data:
    driver: local
  chat_data:
    driver: local
