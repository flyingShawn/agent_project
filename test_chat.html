<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能助手 - 测试页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .chat-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 800px;
            height: 600px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .chat-header h1 {
            font-size: 24px;
            font-weight: 600;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        
        .message {
            margin-bottom: 16px;
            display: flex;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.user {
            justify-content: flex-end;
        }
        
        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.5;
        }
        
        .message.assistant .message-content {
            background: white;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .chat-input {
            padding: 20px;
            background: white;
            border-top: 1px solid #e9ecef;
        }
        
        .input-wrapper {
            display: flex;
            gap: 12px;
        }
        
        .input-wrapper input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 24px;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        
        .input-wrapper input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .input-wrapper button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .input-wrapper button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .input-wrapper button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .quick-questions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        
        .quick-question {
            padding: 6px 12px;
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 16px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .quick-question:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 12px 16px;
        }
        
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        
        .typing-indicator span:nth-child(1) {
            animation-delay: 0s;
        }
        
        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0);
            }
            40% {
                transform: scale(1);
            }
        }
        
        pre {
            background: #f4f4f4;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
        }
        
        table {
            border-collapse: collapse;
            width: 100%;
            margin: 8px 0;
        }
        
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        
        th {
            background: #f4f4f4;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🤖 AI 智能助手</h1>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="message assistant">
                <div class="message-content">
                    你好！我是桌管系统 AI 助手。我可以帮助你：<br><br>
                    - 查询设备资产信息<br>
                    - 了解策略配置方法<br>
                    - 排查常见问题<br>
                    - 分析数据统计<br><br>
                    请问有什么可以帮你的？
                </div>
            </div>
        </div>
        <div class="chat-input">
            <div class="input-wrapper">
                <input type="text" id="messageInput" placeholder="输入问题，按 Enter 发送..." />
                <button id="sendButton" onclick="sendMessage()">发送</button>
            </div>
            <div class="quick-questions">
                <span class="quick-question" onclick="sendQuickQuestion('你好')">你好</span>
                <span class="quick-question" onclick="sendQuickQuestion('一共有哪些部门')">一共有哪些部门</span>
                <span class="quick-question" onclick="sendQuickQuestion('有多少设备在线')">有多少设备在线</span>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000/api/v1/chat';
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        
        let isLoading = false;
        let history = [];
        
        function addMessage(role, content, isStreaming = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = formatMarkdown(content);
            
            messageDiv.appendChild(contentDiv);
            chatMessages.appendChild(messageDiv);
            scrollToBottom();
            
            return contentDiv;
        }
        
        function formatMarkdown(text) {
            text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/\n/g, '<br>');
            
            const tablePattern = /\|(.+?)\|/g;
            if (text.includes('|') && text.includes('---')) {
                const lines = text.split('<br>');
                let inTable = false;
                let tableHtml = '';
                let result = [];
                
                for (let line of lines) {
                    if (line.trim().startsWith('|') && line.trim().includes('---')) {
                        inTable = true;
                        tableHtml = '<table>';
                    } else if (inTable && line.trim().startsWith('|')) {
                        const cells = line.split('|').filter(c => c.trim());
                        const tag = tableHtml.includes('<tbody>') ? 'td' : 'th';
                        if (!tableHtml.includes('<tbody>') && !line.includes('---')) {
                            tableHtml += '<thead><tr>';
                            for (let cell of cells) {
                                tableHtml += `<th>${cell.trim()}</th>`;
                            }
                            tableHtml += '</tr></thead><tbody>';
                        } else if (line.includes('---')) {
                        } else {
                            tableHtml += '<tr>';
                            for (let cell of cells) {
                                tableHtml += `<td>${cell.trim()}</td>`;
                            }
                            tableHtml += '</tr>';
                        }
                    } else {
                        if (inTable) {
                            tableHtml += '</tbody></table>';
                            result.push(tableHtml);
                            inTable = false;
                            tableHtml = '';
                        }
                        result.push(line);
                    }
                }
                
                if (inTable) {
                    tableHtml += '</tbody></table>';
                    result.push(tableHtml);
                }
                
                text = result.join('<br>');
            }
            
            return text;
        }
        
        function addTypingIndicator() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';
            messageDiv.id = 'typingIndicator';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
            
            messageDiv.appendChild(contentDiv);
            chatMessages.appendChild(messageDiv);
            scrollToBottom();
        }
        
        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.remove();
            }
        }
        
        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        async function sendMessage() {
            if (isLoading) return;
            
            const text = messageInput.value.trim();
            if (!text) return;
            
            isLoading = true;
            sendButton.disabled = true;
            messageInput.disabled = true;
            
            addMessage('user', text);
            history.push({ role: 'user', content: text });
            
            messageInput.value = '';
            
            addTypingIndicator();
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        question: text,
                        history: history.slice(0, -1),
                        lognum: 'admin',
                        mode: 'auto',
                    }),
                });
                
                removeTypingIndicator();
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let assistantContent = '';
                let assistantMessageDiv = null;
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';
                    
                    let currentEvent = null;
                    let currentData = '';
                    
                    for (const line of lines) {
                        if (line.startsWith('event: ')) {
                            currentEvent = line.slice(7).trim();
                        } else if (line.startsWith('data: ')) {
                            const dataContent = line.slice(6);
                            if (currentData === '') {
                                currentData = dataContent;
                            } else {
                                currentData = currentData + '\n' + dataContent;
                            }
                        } else if (line === '' && currentEvent && currentData !== '') {
                            if (currentEvent === 'start') {
                            } else if (currentEvent === 'delta') {
                                assistantContent += currentData;
                                if (!assistantMessageDiv) {
                                    assistantMessageDiv = addMessage('assistant', assistantContent);
                                } else {
                                    assistantMessageDiv.innerHTML = formatMarkdown(assistantContent);
                                    scrollToBottom();
                                }
                            } else if (currentEvent === 'done') {
                                history.push({ role: 'assistant', content: assistantContent });
                            } else if (currentEvent === 'error') {
                                try {
                                    const errorData = JSON.parse(currentData);
                                    addMessage('assistant', '错误: ' + errorData.error);
                                } catch {
                                    addMessage('assistant', '错误: ' + currentData);
                                }
                            }
                            
                            currentEvent = null;
                            currentData = '';
                        }
                    }
                }
            } catch (error) {
                removeTypingIndicator();
                addMessage('assistant', '请求失败: ' + error.message);
            } finally {
                isLoading = false;
                sendButton.disabled = false;
                messageInput.disabled = false;
                messageInput.focus();
            }
        }
        
        function sendQuickQuestion(question) {
            messageInput.value = question;
            sendMessage();
        }
        
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
